name: budgetify
description: "Budget management app to help users track their expenses and manage their finances effectively."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_dotenv: ^6.0.0
  flutter_secure_storage: ^10.0.0
  google_sign_in: ^7.2.0
  google_sign_in_web: ^1.1.2
  hugeicons: ^1.1.5
  http: ^1.5.0
  http_parser: ^4.1.2
  image_picker: ^1.2.0
  app_links: ^6.4.1
  toastification: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/branding/
    - assets/images/
    - assets/icons/
    - assets/icons/language/
    - assets/fonts/dm_sans/

  fonts:
    - family: DMSans
      fonts:
        - asset: assets/fonts/dm_sans/DMSans-Thin.ttf
          weight: 100
        - asset: assets/fonts/dm_sans/DMSans-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/dm_sans/DMSans-Light.ttf
          weight: 300
        - asset: assets/fonts/dm_sans/DMSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/dm_sans/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/dm_sans/DMSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/dm_sans/DMSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/dm_sans/DMSans-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/dm_sans/DMSans-Black.ttf
          weight: 900
        - asset: assets/fonts/dm_sans/DMSans-ThinItalic.ttf
          weight: 100
          style: italic
        - asset: assets/fonts/dm_sans/DMSans-ExtraLightItalic.ttf
          weight: 200
          style: italic
        - asset: assets/fonts/dm_sans/DMSans-LightItalic.ttf
          weight: 300
          style: italic
        - asset: assets/fonts/dm_sans/DMSans-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/dm_sans/DMSans-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/dm_sans/DMSans-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: assets/fonts/dm_sans/DMSans-BoldItalic.ttf
          weight: 700
          style: italic
        - asset: assets/fonts/dm_sans/DMSans-ExtraBoldItalic.ttf
          weight: 800
          style: italic
        - asset: assets/fonts/dm_sans/DMSans-BlackItalic.ttf
          weight: 900
          style: italic

# ✅ THIS MUST BE OUTSIDE EVERYTHING
flutter_launcher_icons:
  ios: true
  image_path: "assets/branding/appstore.png"